version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - export DATABASE_URL=${DATABASE_URL:-file:./dev.db}
        - rm -f prisma/dev.db
        - npx prisma db push
        - npx prisma generate
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
